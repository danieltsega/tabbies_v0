<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabbies</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-top">
        <h1>Tabbies</h1>
        <div class="header-actions">
          <button id="export-btn" class="icon-btn" title="Export data as JSON">↓</button>
          <button id="import-btn" class="icon-btn" title="Import data from JSON">↑</button>
          <button id="add-category-btn" class="icon-btn" title="Add Category">+</button>
        </div>
        <input type="file" id="import-file-input" accept=".json,application/json" />
      </div>
      <div class="action-bar">
        <select id="save-category-select" class="action-bar-select"></select>
        <button id="save-active-btn" class="btn-primary">Save</button>
        <button id="shelve-active-btn" class="btn-secondary">Shelve</button>
        <button id="save-all-btn" class="btn-ghost" title="Save all tabs in current window">Save All</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" class="search-input" placeholder="Search tabs..." />
      </div>
      <div class="filter-bar">
        <button class="filter-btn" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="hot">Shelved</button>
        <button class="filter-btn" data-filter="cold">Cold</button>
      </div>
      <div class="sort-bar">
        <select id="sort-select" class="sort-select">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="title-asc">Title A-Z</option>
          <option value="title-desc">Title Z-A</option>
        </select>
      </div>
    </header>
    <main id="tab-list"></main>
    <footer id="footer" class="footer" style="display:none">
      <button id="clear-all-btn" class="footer-btn">Clear all tabs</button>
    </footer>
  </div>

  <div id="category-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2 id="modal-title">Add Category</h2>
      <div class="modal-body">
        <label>
          Name
          <input type="text" id="category-name" placeholder="e.g. Work, Personal" />
        </label>
        <label>
          Emoji
          <input type="text" id="category-emoji" placeholder="📁" maxlength="2" />
        </label>
        <label>
          Color
        </label>
        <div class="color-picker" id="color-picker"></div>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-ghost">Cancel</button>
        <button id="modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
